# ═══════════════════════════════════════════════════════════════════════════════
# .pre-commit-config.yaml
# Escanea commits en busca de secretos Azure antes de que lleguen al repo
# Instalar: pip install pre-commit && pre-commit install
# ═══════════════════════════════════════════════════════════════════════════════

repos:
  # ── Gitleaks: detecta secretos, tokens, claves privadas ──
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── detect-secrets de Yelp: segundo escáner complementario ──
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # ── Checks genéricos de pre-commit ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Evita commits de archivos grandes (CSVs de inventario accidentales)
      - id: check-added-large-files
        args: ['--maxkb=100']
      # Detecta claves privadas
      - id: detect-private-key
      # Evita archivos con credenciales AWS/Azure hardcodeadas
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
